<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生日快乐！</title>
    <style>
        :root {
            --bg-color: #0b0e14;
            --cake-bottom: #f4a7bb;
            --cake-top: #ffc2d1;
            --neon-pink: #ff1493;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'PingFang SC', sans-serif;
            display: flex; justify-content: center; align-items: center;
        }

        /* 烟花画布：覆盖全屏 */
        #fireworksCanvas {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 50; pointer-events: none;
        }

        /* 阶段 1: 准备弹窗 */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a1a2e 0%, #000 100%);
            z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: all 1s ease;
        }

        .ready-btn {
            padding: 15px 50px; font-size: 1.4rem;
            background: transparent; color: white;
            border: 2px solid var(--neon-pink); border-radius: 50px; cursor: pointer;
            box-shadow: 0 0 15px var(--neon-pink); letter-spacing: 2px;
        }

        /* 阶段 2: 蛋糕 */
        #cake-scene {
            display: none; flex-direction: column; align-items: center;
            z-index: 100; color: white;
        }

        .cake-container { position: relative; width: 250px; height: 200px; margin-bottom: 20px; }
        .cake-tier {
            position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 200px; height: 100px; background: var(--cake-bottom);
            border-radius: 100px / 40px; box-shadow: 0 8px 0 #d68095;
        }
        .cake-tier::before {
            content: ''; position: absolute; top: -20px; left: 0;
            width: 200px; height: 80px; background: var(--cake-top);
            border-radius: 100px / 40px;
        }
        .cake-tier::after {
            content: '24'; position: absolute; top: 10px; left: 50%;
            transform: translateX(-50%); font-size: 3.5rem; font-weight: 900;
            color: rgba(255, 255, 255, 0.4);
        }

        .candle {
            position: absolute; bottom: 100px; left: 50%;
            width: 12px; height: 50px; background: #fff;
            transform: translateX(-50%); border-radius: 3px; z-index: 10;
        }
        .flame {
            position: absolute; top: -25px; left: 50%; transform: translateX(-50%);
            width: 18px; height: 30px; background: #ff9d00;
            border-radius: 50% 50% 20% 20%;
            box-shadow: 0 0 20px #ff9d00, 0 0 40px orange;
            animation: flicker 0.1s infinite alternate;
        }

        @keyframes flicker { from { transform: translateX(-50%) scale(1); } to { transform: translateX(-50%) scale(1.1); } }

        /* 阶段 3: 合照 */
        #surprise-scene {
            display: none; width: 100%; height: 100%;
            flex-direction: column; justify-content: center; align-items: center;
            z-index: 60; color: white;
        }
        .photo-frame {
            padding: 15px; background: white; transform: rotate(-2deg);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: photoEntrance 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .couple-photo { max-width: 80vw; max-height: 55vh; display: block; }
        h2 { margin-top: 30px; text-shadow: 0 0 10px var(--neon-pink); text-align: center; }

        .action-btn {
            margin-top: 30px; padding: 10px 30px;
            background: none; border: 1px solid rgba(255,255,255,0.3);
            color: white; border-radius: 20px; cursor: pointer;
        }

        @keyframes photoEntrance { from { opacity: 0; transform: scale(0.5) rotate(-10deg); } to { opacity: 1; transform: scale(1) rotate(-2deg); } }
    </style>
</head>
<body>

    <canvas id="fireworksCanvas"></canvas>

    <div id="overlay">
        <h1 style="color:white; margin-bottom:40px; font-weight:200;">My Princess, Are you ready?</h1>
        <button class="ready-btn" onclick="showCake()">准备好了</button>
    </div>

    <div id="cake-scene">
        <div class="cake-container">
            <div class="candle"><div class="flame" id="flame"></div></div>
            <div class="cake-tier"></div>
        </div>
        <p style="color: #ffc2d1;">闭上眼许个愿，然后吹灭它...</p>
        <button class="action-btn" id="blowBtn" onclick="blowOut()">吹灭蜡烛</button>
    </div>

    <div id="surprise-scene">
        <div class="photo-frame">
            <img src="birthday_img.JPG" class="couple-photo">
        </div>
        <h2>祝我的宝宝24岁生日快乐！❤️</h2>
    </div>

    <script>
        // 1. 烟花引擎代码
        const canvas = document.getElementById('fireworksCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                this.angle = Math.random() * Math.PI * 2;
                this.speed = Math.random() * 6 + 2;
                this.friction = 0.95; this.gravity = 0.15;
                this.alpha = 1; this.decay = Math.random() * 0.015 + 0.01;
            }
            update() {
                this.speed *= this.friction;
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed + this.gravity;
                this.alpha -= this.decay;
            }
            draw() {
                ctx.globalAlpha = this.alpha;
                ctx.beginPath(); ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                ctx.fillStyle = this.color; ctx.fill();
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(11, 14, 20, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, i) => {
                if (p.alpha > 0) { p.update(); p.draw(); }
                else { particles.splice(i, 1); }
            });
            requestAnimationFrame(animate);
        }
        animate();

        function createFirework() {
            const colors = ['#ff1493', '#00bfff', '#9400d3', '#ffff00', '#ff4500'];
            for (let i = 0; i < 15; i++) {
                setTimeout(() => {
                    const x = Math.random() * canvas.width;
                    const y = Math.random() * canvas.height * 0.5;
                    const color = colors[Math.floor(Math.random() * colors.length)];
                    for (let j = 0; j < 50; j++) particles.push(new Particle(x, y, color));
                }, i * 100);
            }
        }

        // 2. 交互逻辑
        function showCake() {
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('cake-scene').style.display = 'flex';
            }, 1000);
        }

        function blowOut() {
            // 熄灭蜡烛
            document.getElementById('flame').style.display = 'none';
            // 立即爆发烟花
            createFirework();
            
            // 2.5秒烟花秀后切换到合照
            setTimeout(() => {
                document.getElementById('cake-scene').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('cake-scene').style.display = 'none';
                    document.getElementById('surprise-scene').style.display = 'flex';
                    // 在照片出现后再放一波小烟花点缀
                    createFirework();
                }, 1000);
            }, 2500);
        }
    </script>
</body>

</html>
